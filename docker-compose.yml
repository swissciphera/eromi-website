# Docker Compose for Dokploy.
#
# Routing, HTTPS and the Let's Encrypt certificate are managed entirely from
# the Dokploy "Domains" tab (domain: web.eromi.ciphera.ch, service: web,
# port 3000, HTTPS, certresolver: letsencrypt). Dokploy injects the required
# Traefik labels at deploy time, so we intentionally do NOT define any Traefik
# labels here — doing so would create a second, conflicting router and trigger
# failed Let's Encrypt challenges.
#
# Cloudflare setup (to force HTTPS and avoid redirect loops / cert errors):
#   1. SSL/TLS mode: "Full (strict)"  -> Cloudflare talks HTTPS to the origin.
#      Never use "Flexible": it causes an infinite redirect loop.
#   2. "Always Use HTTPS": ON          -> Cloudflare upgrades every visitor to
#      HTTPS, so the site only ever serves over HTTPS.
#   3. First certificate issuance: temporarily set the DNS record to
#      "DNS only" (grey cloud) so Let's Encrypt can validate over HTTP-01,
#      then switch the proxy back on (orange cloud).
#   (In Dokploy: keep the domain on HTTPS; enabling "Redirect to HTTPS" there
#    is optional once Cloudflare "Always Use HTTPS" is on.)

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
